name: Fetch data

on:
  schedule:
    # KST 06:00 / 12:00 / 19:00 (UTC 21:00 전날 / 03:00 / 10:00)
    - cron: "0 21,3,10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Fetch news
        run: npm run fetch-news

      - name: Fetch indices
        run: npm run fetch-indices

      - name: Commit if changed
        run: |
          if git diff --quiet news-feed.json indices.json; then
            echo "no changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add news-feed.json indices.json
            git commit -m "chore: scheduled data refresh"
            git push
          fi
