name: Fetch data

on:
  schedule:
    # KST 06:00 / 12:00 / 19:00 (UTC 21:00 전날 / 03:00 / 10:00)
    - cron: "0 21,3,10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Fetch news
        run: npm run fetch-news

      - name: Fetch indices
        run: npm run fetch-indices

      - name: Commit & push if changed
        run: |
          if git diff --quiet news-feed.json indices.json; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news-feed.json indices.json
          git commit -m "chore: scheduled data refresh"

          # GitHub git backend가 commit_refs 단계에서 산발적 실패를 일으키는 경우 대비:
          # rebase + push를 최대 5회 재시도, 지수 백오프
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push failed on attempt $attempt, retrying after rebase..."
            sleep $((attempt * 15))
            git pull --rebase origin main || true
          done
          echo "push failed after 5 attempts"
          exit 1

  deploy:
    needs: fetch
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
