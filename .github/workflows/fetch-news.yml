name: Fetch news

on:
  schedule:
    # 매일 KST 07:00 (UTC 22:00 전날)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Fetch news
        run: npm run fetch-news

      - name: Commit if changed
        run: |
          if git diff --quiet news-feed.json; then
            echo "no changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add news-feed.json
            git commit -m "chore: daily news feed update"
            git push
          fi
